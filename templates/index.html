<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои Задачи</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 {
            font-weight: 600;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        h2 {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 1rem;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f9fafb;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            transition: transform 0.1s;
        }

        li:hover {
            transform: translateX(4px);
            border-color: var(--accent);
        }

        /* Если в базе данных это кортеж (id, title, completed) */
        .task-text {
            flex: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Мои задачи</h1>
    
    <div class="input-group">
        <form action="/add" method="POST">
            <input name="title" placeholder="Что нужно сделать?">
            <button>Добавить</button>
        </form>
    </div>

    <h2>Список дел</h2>
    <ul>
        {% for todo in todos %}
            <li>
                <span class="task-text">{{ todo[1] }}</span>
            </li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
